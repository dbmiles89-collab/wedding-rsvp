<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP | Daniel & Fatima</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: #0b2b2b;
      font-family: 'Georgia', serif;
    }
    .script {
      font-family: 'Dancing Script', cursive;
      font-size: 2.8rem;
    }
    .floral-bg {
      background-image: linear-gradient(rgba(11, 43, 43, 0.85), rgba(11, 43, 43, 0.9)), 
                        url('https://picsum.photos/id/1015/2000/1200');
      background-size: cover;
      background-position: center;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="text-[#e8d5b8] min-h-screen floral-bg">
  <div class="max-w-2xl mx-auto py-16 px-6">
    <div class="text-center mb-12">
      <p class="text-sm tracking-widest mb-4">YOU ARE INVITED TO THE WEDDING OF</p>
      
      <h1 class="text-7xl leading-none mb-2">DANIEL</h1>
      <p class="script text-[#d4af88] -mt-6">Miles</p>
      
      <p class="text-2xl my-6">AND</p>
      
      <h1 class="text-7xl leading-none mb-2">FATIMA</h1>
      <p class="script text-[#d4af88] -mt-6">Janyang</p>

      <div class="mt-10 text-lg">
        <p>Saturday, 23rd May 2026 • 12:30 PM – 10:00 PM</p>
        <p class="mt-2">St John’s Greenhill, Harrow, HA1 2JE</p>
      </div>
    </div>

    <div class="bg-[#0b2b2b]/90 backdrop-blur-md border border-[#d4af88]/30 rounded-3xl p-10 shadow-2xl">
      <h2 class="text-center text-3xl mb-8 text-[#d4af88]">RSVP</h2>
      
      <form name="rsvp" method="POST" data-netlify="true" class="space-y-8">
        <input type="hidden" name="form-name" value="rsvp">

        <div>
          <label class="block text-sm tracking-widest mb-2">FULL NAME(S)</label>
          <input type="text" name="name" required 
                 class="w-full bg-transparent border border-[#d4af88]/50 rounded-2xl px-6 py-4 text-lg focus:outline-none focus:border-[#d4af88]">
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-sm tracking-widest mb-2">WILL YOU ATTEND?</label>
            <select name="attending" required 
                    class="w-full bg-transparent border border-[#d4af88]/50 rounded-2xl px-6 py-4 text-lg">
              <option value="">Select</option>
              <option value="Yes">Yes, we will be there</option>
              <option value="No">Unfortunately we cannot attend</option>
            </select>
          </div>
          <div>
            <label class="block text-sm tracking-widest mb-2">NUMBER OF GUESTS</label>
            <input type="number" name="guests" value="1" min="1" 
                   class="w-full bg-transparent border border-[#d4af88]/50 rounded-2xl px-6 py-4 text-lg">
          </div>
        </div>

        <div>
          <label class="block text-sm tracking-widest mb-2">DIETARY REQUIREMENTS / ALLERGIES</label>
          <textarea name="dietary" rows="3" 
                    class="w-full bg-transparent border border-[#d4af88]/50 rounded-2xl px-6 py-4"></textarea>
        </div>

        <div>
          <label class="block text-sm tracking-widest mb-2">A MESSAGE FOR THE COUPLE (OPTIONAL)</label>
          <textarea name="message" rows="4" 
                    class="w-full bg-transparent border border-[#d4af88]/50 rounded-2xl px-6 py-4"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-[#d4af88] hover:bg-[#c49a6f] text-[#0b2b2b] font-medium py-5 rounded-2xl text-xl transition">
          SEND RSVP
        </button>
      </form>
    </div>

    <p class="text-center mt-10 text-[#d4af88]/70 text-sm">
      Your presence is our greatest gift ❤️
    </p>
  </div>
</body>
</html>
