<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Wedding | RSVP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-stone-50 font-sans">
  <div class="max-w-lg mx-auto py-12 px-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-serif text-stone-800 mb-2">Emma & James</h1>
      <p class="text-xl text-stone-600">Saturday, 15th November 2026</p>
      <p class="text-stone-500">Venue • Location</p>
    </div>

    <form name="rsvp" method="POST" data-netlify="true" class="bg-white shadow-xl rounded-2xl p-8 space-y-6">
      <input type="hidden" name="form-name" value="rsvp">

      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Full Name(s)</label>
        <input type="text" name="name" required class="w-full px-4 py-3 border border-stone-300 rounded-xl focus:outline-none focus:border-rose-300">
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1">Will you be attending?</label>
          <select name="attending" required class="w-full px-4 py-3 border border-stone-300 rounded-xl">
            <option value="">Select</option>
            <option value="Yes">Yes, with pleasure!</option>
            <option value="No">Sorry, can't make it</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1">Number of guests</label>
          <input type="number" name="guests" value="1" min="1" class="w-full px-4 py-3 border border-stone-300 rounded-xl">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Dietary requirements / allergies</label>
        <textarea name="dietary" rows="3" class="w-full px-4 py-3 border border-stone-300 rounded-xl"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-stone-700 mb-1">Message for the couple (optional)</label>
        <textarea name="message" rows="3" class="w-full px-4 py-3 border border-stone-300 rounded-xl"></textarea>
      </div>

      <button type="submit" 
              class="w-full bg-rose-600 hover:bg-rose-700 text-white font-medium py-4 rounded-2xl transition text-lg">
        Send RSVP
      </button>
    </form>

    <p class="text-center text-stone-400 text-sm mt-8">We can't wait to celebrate with you ❤️</p>
  </div>
</body>
</html>
