<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP | Daniel & Fatima</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #0b2b2b url('background.jpg') center/cover no-repeat fixed;
      font-family: 'Playfair Display', serif;
    }
    .script {
      font-family: 'Dancing Script', cursive;
    }
  </style>
</head>
<body class="text-[#e8d5b8] min-h-screen">
  <div class="max-w-2xl mx-auto py-16 px-6">
    <div class="text-center mb-12">
      <p class="text-sm tracking-[3px] mb-6 opacity-90">YOU HAVE BEEN INVITED TO THE WEDDING OF</p>
      

      <div class="mt-10 text-lg leading-relaxed">
        <p>Saturday, 23 May 2026 • 12:30pm – 10:00pm</p>
        <p>St John’s Greenhill, Harrow, HA1 2JE</p>
      </div>
    </div>

    <div class="bg-[#0b2b2b]/95 backdrop-blur-md border border-[#d4af88]/40 rounded-3xl p-10 shadow-2xl">
      <h2 class="text-center text-3xl mb-10 text-[#d4af88] tracking-widest">RSVP</h2>
      
      <form name="rsvp" method="POST" data-netlify="true" class="space-y-8">
        <input type="hidden" name="form-name" value="rsvp">

        <div>
          <label class="block text-xs tracking-widest mb-2">FULL NAME(S)</label>
          <input type="text" name="name" required 
                 class="w-full bg-transparent border border-[#d4af88]/60 rounded-2xl px-6 py-4 text-lg focus:border-[#d4af88]">
        </div>

        <div class="grid grid-cols-2 gap-6">
          <div>
            <label class="block text-xs tracking-widest mb-2">WILL YOU ATTEND?</label>
            <select name="attending" required 
                    class="w-full bg-transparent border border-[#d4af88]/60 rounded-2xl px-6 py-4 text-lg">
              <option value="">Please select</option>
              <option value="Yes">Yes, we will attend</option>
              <option value="No">We regretfully cannot attend</option>
            </select>
          </div>
          <div>
            <label class="block text-xs tracking-widest mb-2">NUMBER OF GUESTS</label>
            <input type="number" name="guests" value="1" min="1" 
                   class="w-full bg-transparent border border-[#d4af88]/60 rounded-2xl px-6 py-4 text-lg">
          </div>
        </div>

        <div>
          <label class="block text-xs tracking-widest mb-2">DIETARY REQUIREMENTS</label>
          <textarea name="dietary" rows="3" 
                    class="w-full bg-transparent border border-[#d4af88]/60 rounded-2xl px-6 py-4"></textarea>
        </div>

        <div>
          <label class="block text-xs tracking-widest mb-2">MESSAGE FOR DANIEL & FATIMA</label>
          <textarea name="message" rows="4" 
                    class="w-full bg-transparent border border-[#d4af88]/60 rounded-2xl px-6 py-4"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-[#d4af88] hover:bg-amber-200 text-[#0b2b2b] font-medium py-5 rounded-2xl text-xl transition">
          SUBMIT RSVP
        </button>
      </form>
    </div>

    <p class="text-center mt-12 text-[#d4af88]/70 text-sm">
      Your presence is our greatest gift
    </p>
  </div>
</body>
</html>
